<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>LAS 시니어 인턴기자 모집 AI 교육 안내</title>
  <meta name="description" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:title" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:description" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:image" content="01.png" />
  <meta property="og:type" content="article" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta http-equiv="Content-Security-Policy" content="frame-src https://www.youtube.com https://www.youtube-nocookie.com;">
  <style>
    html { -webkit-text-size-adjust: none; }
    body { margin:0; padding:0; font-size:12px; font-family: Dotum, sans-serif; color:#2B2B2B; background:#fff; }
    div, dl, dt, dd, ul, ol, li, h1, h2, h3, h4, form, fieldset, p, button { margin:0; padding:0; }
    a { font-family:"Dotum"; font-size:12px; text-decoration:none; color:#2B2B2B; }
    * { box-sizing: border-box; }

    /* ── 상단바 ── */
    .Layer_Top_Follow_Box {
      position: fixed;
      z-index: 999;
      width: 100%;
      background-color: #ffffff;
      border-bottom: 1px #F2F2F2 solid;
      filter: alpha(opacity=95);
      opacity: 0.95;
    }

    .Layer_Top_Follow_Length {
      overflow: hidden;
      max-width: 800px;
      margin: 0 auto;
    }

    .Layer_Top_Follow_Length .Landing_Title_Box {
      float: left;
      font-size: 25px;
      font-weight: bold;
      font-family: malgun gothic;
      padding: 10px;
    }

    @media screen and (max-width: 800px) {
      .Layer_Top_Follow_Length .Landing_Title_Box { font-size: 16px; }
    }

    /* ── 본문 (padding-top은 JS로 동적 설정) ── */
    .Landing_Content_Box {
      max-width: 800px;
      margin: 0 auto;
    }

    .Landing_Content_Box img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── 유튜브 반응형 16:9 ── */
    .youtube-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      background: #000;
    }

    .youtube-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- 상단 고정 탭바 -->
  <div class="Layer_Top_Follow_Box" id="Top_lay_follow_box">
    <div class="Layer_Top_Follow_Length">
      <div class="Landing_Title_Box"> LAS  시니어 인턴기자 모집  AI 교육 안내 </div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="Landing_Content_Box" id="Landing_Content_Box">

    <div class="youtube-wrap">
      <iframe
        src="https://www.youtube-nocookie.com/embed/of4o3f5INvw?rel=0&modestbranding=1&origin=https://lasbook.github.io"
        title="LAS 시니어 인턴기자 모집 AI 교육 안내"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <img src="01.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="02.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="03.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="04.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="05.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="06.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="07.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  </div>

  <script>
    function adjustTopPadding() {
      var bar = document.getElementById('Top_lay_follow_box');
      var content = document.getElementById('Landing_Content_Box');
      content.style.paddingTop = bar.offsetHeight + 'px';
    }

    // 로드 시 + 리사이즈 시 (폰트 로딩 후에도 정확히 측정)
    adjustTopPadding();
    window.addEventListener('resize', adjustTopPadding);
    window.addEventListener('load', adjustTopPadding);
  </script>

</body>
</html>
