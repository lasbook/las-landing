<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>LAS 시니어 인턴기자 모집 AI 교육 안내</title>
  <meta name="description" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:title" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:description" content="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  <meta property="og:image" content="01.png" />
  <meta property="og:type" content="article" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    /* ── 원본 dbcart 글로벌 CSS ── */
    html { -webkit-text-size-adjust: none; }
    body { margin:0; padding:0; font-size:12px; font-family: Dotum, sans-serif; color:#2B2B2B; background:#fff; }
    div, dl, dt, dd, ul, ol, li, h1, h2, h3, h4, form, fieldset, p, button { margin:0; padding:0; }
    a { font-family:"Dotum"; font-size:12px; text-decoration:none; color:#2B2B2B; }
    * { box-sizing: border-box; }

    /* ── 상단바 (원본 그대로) ── */
    .Layer_Top_Follow_Box {
      position: fixed;
      z-index: 999;
      width: 100%;
      background-color: #ffffff;
      border-bottom: 1px #F2F2F2 solid;
      filter: alpha(opacity=95);
      opacity: 0.95;
    }

    .Layer_Top_Follow_Length {
      overflow: hidden;
      max-width: 800px;
      margin: 0 auto;
    }

    .Layer_Top_Follow_Length .Landing_Title_Box {
      float: left;
      font-size: 25px;
      font-weight: bold;
      font-family: malgun gothic;
      padding: 10px 0;
    }

    .Layer_Top_Follow_Length .Landing_Button_Box {
      float: right;
      border-radius: 20px;
      margin: 10px 0;
    }

    .Layer_Top_Follow_Length .Landing_Button_Box a {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      display: block;
      padding: 10px 20px;
    }

    @media screen and (max-width: 800px) {
      .Layer_Top_Follow_Length .Landing_Title_Box { padding: 10px; }
      .Layer_Top_Follow_Length .Landing_Button_Box { margin: 10px; }
    }

    .bg_color_box1 { background-color: #1562CF; }

    /* ── 본문 ── */
    .Landing_Content_Box {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 112px; /* 상단바 62px + 추가 margin 50px */
    }

    .Landing_Content_Box img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── 비디오 ── */
    .Landing_Content_Box video {
      width: 100%;
      height: auto;
      display: block;
    }

    #form_location {
      display: block;
    }
  </style>
</head>
<body>

  <!-- 상단 고정 탭바 -->
  <div class="Layer_Top_Follow_Box" id="Top_lay_follow_box">
    <div class="Layer_Top_Follow_Length">
      <div class="Landing_Title_Box"> LAS  시니어 인턴기자 모집  AI 교육 안내 </div>
      <div class="Landing_Button_Box bg_color_box1">
        <a href="#form_location" onclick="Taget_move_slide();return false;">lassneiortimes@gmail.com  본인소개서  보내기 </a>
      </div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="Landing_Content_Box">
    <!-- 영상 (01.png 위에) - playbackRate JS로 1.5배속 -->
    <video id="main_video" autoplay muted loop playsinline>
      <source src="first.mp4" type="video/mp4" />
    </video>
    <img src="01.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="02.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="03.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="04.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="05.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <img src="06.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
    <span id="form_location"></span>
    <img src="07.png" alt="LAS 시니어 인턴기자 모집 AI 교육 안내" />
  </div>

  <script>
    // 영상 재생속도 설정 (1.5 = 1.5배속, 2.0 = 2배속)
    var video = document.getElementById('main_video');
    video.addEventListener('loadedmetadata', function() {
      video.playbackRate = 1.5;
    });

    function Taget_move_slide() {
      var target = document.getElementById('form_location');
      if (!target) return;
      var barH = document.getElementById('Top_lay_follow_box').offsetHeight;
      var targetTop = target.getBoundingClientRect().top + window.pageYOffset - barH;
      window.scrollTo({ top: targetTop, behavior: 'smooth' });
    }
  </script>

</body>
</html>
